version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engineering_doc_review_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./engineering_doc_review.db
      - DEBUG=True
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - frontend
    networks:
      - engineering_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: engineering_doc_review_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    networks:
      - engineering_network

networks:
  engineering_network:
    driver: bridge

volumes:
  uploads:
  logs:
